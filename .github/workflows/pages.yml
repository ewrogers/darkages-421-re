name: mdBook

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  MDBOOK_VERSION: 0.5.3
  MDBOOK_SHA256: e2fd508a4fac06cbaa9f88b97d27bdc3b55a08946304ca845879fe26a3699e11

jobs:
  build:
    name: Build book
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install mdBook
        shell: bash
        run: |
          archive="$RUNNER_TEMP/mdbook.tar.gz"
          install_dir="$RUNNER_TEMP/mdbook"
          url="https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"

          curl --fail --location --silent --show-error "$url" --output "$archive"
          echo "${MDBOOK_SHA256}  ${archive}" | sha256sum --check --status
          mkdir --parents "$install_dir"
          tar --extract --gzip --file "$archive" --directory "$install_dir"
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Build mdBook
        run: mdbook build

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: book

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    concurrency:
      group: github-pages
      cancel-in-progress: false

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
